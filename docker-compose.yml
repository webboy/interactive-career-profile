services:
  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    ports:
      - "9000:9000"
    environment:
      PORT: 9000
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PORT: 8000
      DATABASE_URL: postgresql+psycopg://icp:icp@postgres:5432/icp
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: icp
      DATABASE_NAME: icp
      MCP_URL: http://mcp:8100
      LOCAL_STORAGE_PATH: /storage/uploads
    volumes:
      - ./apps/api:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      mcp:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  mcp:
    build:
      context: .
      dockerfile: docker/mcp.Dockerfile
    ports:
      - "8100:8100"
    environment:
      PORT: 8100
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: icp
      POSTGRES_PASSWORD: icp
      POSTGRES_DB: icp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icp -d icp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailpit:
    image: axllent/mailpit:latest
    profiles:
      - mail
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:

networks:
  default:
    name: icp-network
